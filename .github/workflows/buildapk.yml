name: Build APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
          - profile

env:
  FLUTTER_VERSION: "3.24.5"
  JAVA_VERSION: "17"
  NDK_VERSION: "25.1.8937393"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # ── 3. Android NDK (required by tflite_flutter) ─────────────────────────
      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # ── 4. Flutter ─────────────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Verify Flutter setup
        run: |
          flutter --version
          flutter doctor -v

      # ── 5. pub cache ────────────────────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_ROOT }}/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. Assets check ─────────────────────────────────────────────────────
      - name: Verify required assets
        run: |
          if [ ! -f "assets/db/tocfl_vocab_clean.db" ]; then
            echo "ERROR: assets/db/tocfl_vocab_clean.db not found!"
            echo "Make sure the DB file is committed to the repository."
            exit 1
          fi
          echo "✓ DB asset found ($(du -h assets/db/tocfl_vocab_clean.db | cut -f1))"

      # ── 7. Code analysis ─────────────────────────────────────────────────────
      # Chỉ analyze lib/ — test/widget_test.dart mặc định của Flutter dùng
      # MyApp không tồn tại trong project này, luôn gây error nếu scan test/.
      # --no-fatal-infos + --no-fatal-warnings: chỉ error thực sự mới fail CI.
      - name: Fix default widget_test
        run: |
          cat > test/widget_test.dart <<'TESTEOF'
          import 'package:flutter_test/flutter_test.dart';
          import 'package:provider/provider.dart';
          import 'package:tocfl_writer/app.dart';
          import 'package:tocfl_writer/logic.dart';

          void main() {
            testWidgets('App smoke test', (WidgetTester tester) async {
              await tester.pumpWidget(
                ChangeNotifierProvider(
                  create: (_) => AppState(),
                  child: const WriterApp(),
                ),
              );
              expect(find.byType(WriterApp), findsOneWidget);
            });
          }
          TESTEOF

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib/

      # ── 8. Keystore setup (release only) ─────────────────────────────────────
      # NOTE: secrets.* cannot be used in `if:` expressions — always evaluates
      # to empty string. Instead we write a sentinel env var in a prior step,
      # then gate on that env var.
      - name: Check keystore secret availability
        id: keystore-check
        env:
          _KS: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$_KS" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up signing keystore
        if: |
          steps.keystore-check.outputs.available == 'true' &&
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.build_type == 'release')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
          echo "SIGNING_CONFIGURED=true" >> $GITHUB_ENV

      # ── 9. Determine build type ───────────────────────────────────────────────
      - name: Determine build flavor
        id: build-flavor
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BUILD_TYPE=${{ inputs.build_type }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "BUILD_TYPE=debug" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          else
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          fi

      # ── 10. Build APK ─────────────────────────────────────────────────────────
      - name: Build APK (release)
        if: env.BUILD_TYPE == 'release'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-shrink \
            --dart-define=FLUTTER_BUILD_MODE=release
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build APK (debug)
        if: env.BUILD_TYPE == 'debug'
        run: |
          flutter build apk \
            --debug \
            --dart-define=FLUTTER_BUILD_MODE=debug
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build APK (profile)
        if: env.BUILD_TYPE == 'profile'
        run: |
          flutter build apk \
            --profile \
            --split-per-abi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── 11. Collect APK artifacts ─────────────────────────────────────────────
      - name: Locate and rename APK files
        id: locate-apks
        run: |
          mkdir -p dist
          BUILD_DIR="build/app/outputs/flutter-apk"

          echo "APK files found:"
          find "$BUILD_DIR" -name "*.apk" | sort

          # Copy all APKs to dist/, strip flutter- prefix for clean names
          for apk in "$BUILD_DIR"/*.apk; do
            name=$(basename "$apk" | sed 's/^app-/tocfl_writer-/')
            cp "$apk" "dist/$name"
            echo "  → dist/$name ($(du -h "$apk" | cut -f1))"
          done

          echo "APK_COUNT=$(ls dist/*.apk | wc -l)" >> $GITHUB_OUTPUT

      # ── 12. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tocfl-writer-apk-${{ env.BUILD_TYPE }}-${{ github.run_number }}
          path: dist/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 13. Build summary ─────────────────────────────────────────────────────
      - name: Write build summary
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build type | \`${{ env.BUILD_TYPE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | \`${{ env.FLUTTER_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK | \`${{ env.NDK_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/*.apk >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # ── 14. GitHub Release (tags only) ────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && env.BUILD_TYPE == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 15. Cleanup sensitive files ────────────────────────────────────────────
      - name: Cleanup keystore
        if: always()
        run: |
          rm -f android/app/release.jks
          rm -f android/key.properties
