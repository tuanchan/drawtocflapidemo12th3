name: Build iOS Unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      # FIX 1: Download TensorFlowLiteC framework cho tflite_flutter 0.10.x
      - name: Download TFLite iOS framework
        run: |
          TFLITE_VERSION="2.12.0"
          FRAMEWORK_DIR="$HOME/.pub-cache/hosted/pub.dev/tflite_flutter-0.10.4/ios"
          mkdir -p "$FRAMEWORK_DIR"

          echo "Downloading TensorFlowLiteC ${TFLITE_VERSION}..."
          curl -L \
            "https://github.com/tensorflow/tensorflow/releases/download/v${TFLITE_VERSION}/TensorFlowLiteC-${TFLITE_VERSION}.tar.gz" \
            -o /tmp/TFLite.tar.gz

          tar xzf /tmp/TFLite.tar.gz -C /tmp/

          # Copy framework vào thư mục tflite_flutter package
          if [ -d "/tmp/TensorFlowLiteC.xcframework" ]; then
            cp -R /tmp/TensorFlowLiteC.xcframework "$FRAMEWORK_DIR/"
            echo "✅ Framework copied to $FRAMEWORK_DIR"
          else
            echo "⚠️  xcframework not found in archive, listing contents:"
            ls -la /tmp/
          fi

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Create iOS platform folder if needed
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder not found — creating it..."
            flutter create --platforms=ios .
          else
            echo "iOS folder already exists."
          fi

      - name: Write fixed Podfile
        run: |
          cat > ios/Podfile <<'EOF'
          platform :ios, '15.5'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.build_configurations.each do |config|
              config.build_settings['EXCLUDED_ARCHS[sdk=*]'] = 'armv7'
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'
              config.build_settings['ENABLE_BITCODE'] = 'NO'
            end

            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)

              if target.name == 'tflite_flutter'
                target.build_configurations.each do |config|
                  config.build_settings['ENABLE_BITCODE'] = 'NO'
                  config.build_settings['EXCLUDED_ARCHS[sdk=iphonesimulator*]'] = 'arm64'
                end
              end

              target.build_configurations.each do |config|
                current_target = config.build_settings['IPHONEOS_DEPLOYMENT_TARGET']
                if current_target.nil? || Gem::Version.new(current_target) < Gem::Version.new('15.5')
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'
                end
              end
            end
          end
          EOF

          echo "===== ios/Podfile ====="
          cat ios/Podfile

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod install --repo-update

      # FIX 2: Verify TFLite framework tồn tại trước khi build
      - name: Verify TFLite framework
        run: |
          echo "=== Searching for TensorFlowLiteC ==="
          find $HOME/.pub-cache -name "TensorFlowLiteC*" 2>/dev/null || echo "Not in pub-cache"
          find ios -name "TensorFlowLiteC*" 2>/dev/null || echo "Not in ios folder"
          find . -name "*.xcframework" 2>/dev/null | head -20

      - name: Flutter build iOS release (no codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Verify Runner.app exists
        run: |
          test -d build/ios/iphoneos/Runner.app || (echo "Runner.app not found" && exit 1)
          ls -la build/ios/iphoneos
          ls -la build/ios/iphoneos/Runner.app

      - name: Package unsigned IPA
        run: |
          rm -rf Payload TocflWriter-unsigned.ipa
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r TocflWriter-unsigned.ipa Payload
          echo "===== IPA STRUCTURE ====="
          unzip -l TocflWriter-unsigned.ipa | head -100

      - name: Validate IPA structure
        run: |
          unzip -l TocflWriter-unsigned.ipa | grep "Payload/Runner.app/" || (echo "Invalid IPA structure" && exit 1)

      # FIX 3: Verify TFLite framework được bundle trong IPA
      - name: Verify TFLite in IPA
        run: |
          echo "=== Checking TFLite in IPA ==="
          unzip -l TocflWriter-unsigned.ipa | grep -i "tensorflow\|tflite" || echo "⚠️  TFLite not found in IPA — may cause runtime error"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TocflWriter-unsigned-ipa
          path: TocflWriter-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
