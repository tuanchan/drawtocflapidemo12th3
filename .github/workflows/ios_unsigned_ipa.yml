name: Build iOS Unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Create iOS folder if missing
        run: |
          if [ ! -d "ios" ]; then
            echo "ios folder missing — creating..."
            flutter create --platforms=ios .
          else
            echo "ios folder exists ✅"
          fi

      - name: Force iOS deployment target to 15.5
        run: |
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 15.5" ios/Flutter/AppFrameworkInfo.plist || true
          perl -0pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.5;/g' ios/Runner.xcodeproj/project.pbxproj || true

      - name: Disable code signing in project.pbxproj
        run: |
          perl -0pi -e 's/DEVELOPMENT_TEAM = [A-Z0-9]+;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj || true
          perl -0pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj || true
          perl -0pi -e 's/CODE_SIGN_IDENTITY = ".*?";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj || true

      - name: Show Podfile
        run: cat ios/Podfile

      - name: Inject code signing off into existing post_install
        run: |
          perl -0pi -e '
            s/(post_install do \|installer\|)/$1\n  installer.pods_project.targets.each do |t|\n    t.build_configurations.each do |c|\n      c.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\n      c.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\n      c.build_settings["EXPANDED_CODE_SIGN_IDENTITY"] = ""\n      c.build_settings["DEVELOPMENT_TEAM"] = ""\n    end\n  end/
          ' ios/Podfile

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Flutter build iOS release (no codesign)
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            ios/Runner.xcodeproj/project.pbxproj
          set -o pipefail
          gem install xcpretty --no-document 2>/dev/null || true
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty
          mkdir -p build/ios/iphoneos
          cp -R build/ios/DerivedData/Build/Products/Release-iphoneos/Runner.app \
            build/ios/iphoneos/Runner.app

      - name: Verify Runner.app exists
        run: |
          test -d build/ios/iphoneos/Runner.app || (echo "Runner.app not found" && exit 1)
          ls -la build/ios/iphoneos/Runner.app

      - name: Package unsigned IPA
        run: |
          rm -rf Payload TocflWriter-unsigned.ipa
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r TocflWriter-unsigned.ipa Payload
          unzip -l TocflWriter-unsigned.ipa | head -100

      - name: Validate IPA structure
        run: |
          unzip -l TocflWriter-unsigned.ipa | grep "Runner.app/" || (echo "Invalid IPA structure" && exit 1)

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TocflWriter-unsigned-ipa
          path: TocflWriter-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
