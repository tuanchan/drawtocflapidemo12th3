name: Build iOS Unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Flutter ──
      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 3. Flutter pub get ──
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Create iOS platform if missing ──
      - name: Create iOS platform folder if needed
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder not found — creating it..."
            flutter create --platforms=ios .
          else
            echo "iOS folder already exists."
          fi

      # ── 5. Pod install ──
      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod install --repo-update

      # ── 6. Build iOS (no code sign) ──
      - name: Flutter build iOS release (no codesign)
        run: |
          flutter build ios --release --no-codesign

      # ── 7. Package into .ipa (Payload/Runner.app → zip → rename) ──
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -qr TocflWriter-unsigned.ipa Payload
          rm -rf Payload
          echo "IPA created: TocflWriter-unsigned.ipa"
          ls -lh TocflWriter-unsigned.ipa

      # ── 8. Upload artifact ──
      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TocflWriter-unsigned-ipa
          path: TocflWriter-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
