name: Build iOS Unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Create iOS platform folder if needed
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder not found — creating it..."
            flutter create --platforms=ios .
          else
            echo "iOS folder already exists."
          fi

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install --repo-update

      - name: Verify TFLite pod installed
        run: |
          echo "=== Checking TFLite in Pods ==="
          find ios/Pods -name "*TensorFlow*" -o -name "*tflite*" 2>/dev/null | head -20

      - name: Flutter build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Verify Runner.app exists
        run: |
          test -d build/ios/iphoneos/Runner.app || (echo "Runner.app not found" && exit 1)
          ls -la build/ios/iphoneos/Runner.app

      - name: Package unsigned IPA
        run: |
          rm -rf Payload TocflWriter-unsigned.ipa
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r TocflWriter-unsigned.ipa Payload
          echo "===== IPA STRUCTURE ====="
          unzip -l TocflWriter-unsigned.ipa | head -100

      - name: Validate IPA structure
        run: |
          unzip -l TocflWriter-unsigned.ipa | grep "Payload/Runner.app/" || (echo "Invalid IPA structure" && exit 1)

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TocflWriter-unsigned-ipa
          path: TocflWriter-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
