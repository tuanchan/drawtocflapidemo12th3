name: Build iOS Unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: "stable"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create iOS platform folder if needed
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder not found — creating it..."
            flutter create --platforms=ios .
          else
            echo "iOS folder already exists."
          fi

      - name: Patch iOS Podfile for ML Kit
        run: |
          ruby -e "
          podfile = 'ios/Podfile'
          text = File.read(podfile)

          text.gsub!(/^#\s*platform :ios, .*/, \"platform :ios, '15.5'\")
          unless text.include?(\"platform :ios, '15.5'\")
            text = \"platform :ios, '15.5'\n\" + text
          end

          unless text.include?(\"\$iOSVersion = '15.5'\")
            text.sub!(/target 'Runner' do/, \"\$iOSVersion = '15.5'\n\ntarget 'Runner' do\")
          end

          post_install_block = <<~RUBY
          post_install do |installer|
            installer.pods_project.build_configurations.each do |config|
              config.build_settings['EXCLUDED_ARCHS[sdk=*]'] = 'armv7'
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = \$iOSVersion
            end

            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                if Gem::Version.new(\$iOSVersion) > Gem::Version.new(config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] || '0')
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = \$iOSVersion
                end
              end
            end
          end
          RUBY

          text.gsub!(/post_install do \|installer\|.*?end\s*$/m, post_install_block)
          File.write(podfile, text)
          "

          echo "===== ios/Podfile ====="
          cat ios/Podfile

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod install --repo-update

      - name: Flutter build iOS release (no codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -qr TocflWriter-unsigned.ipa Payload
          rm -rf Payload
          echo "IPA created: TocflWriter-unsigned.ipa"
          ls -lh TocflWriter-unsigned.ipa

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TocflWriter-unsigned-ipa
          path: TocflWriter-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
