name: tocfl_writer
description: TOCFL Hanzi Writing Practice App - Local SQLite, dark theme, canvas stroke engine.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # SQLite database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Lightweight state management
  provider: ^6.1.2

  # Shared preferences for local state
  shared_preferences: ^2.2.3

  # Offline stroke-based handwriting recognition
  google_mlkit_digital_ink_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/db/tocfl_vocab_clean.db
