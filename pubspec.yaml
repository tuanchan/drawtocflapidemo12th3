name: tocfl_writer
description: TOCFL Hanzi Writing Practice App - Local SQLite, dark theme, canvas stroke engine.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.2.6
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  tflite_flutter: ^0.12.1
  image: ^4.2.0 # resize + grayscale trước khi feed model

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/db/tocfl_vocab_clean.db
    - assets/ml/handwriting.tflite
    - assets/ml/labels.json
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_channel_ios: true # iOS không cho phép alpha
